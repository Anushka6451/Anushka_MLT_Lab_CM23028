<!DOCTYPE html>
<html>
<head>
    <title>Pose Keypoints Detection</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
</head>

<body>

<h2>Pose Keypoints + Skeleton</h2>
<canvas id="canvas"></canvas>

<script>
let webcam, model, ctx;

async function init() {
    const URL = "./my_model/";
    model = await tmPose.load(URL + "model.json", URL + "metadata.json");

    webcam = new tmPose.Webcam(400, 400, true);
    await webcam.setup();
    await webcam.play();

    const canvas = document.getElementById("canvas");
    canvas.width = 400;
    canvas.height = 400;
    ctx = canvas.getContext("2d");

    window.requestAnimationFrame(loop);
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const { pose } = await model.estimatePose(webcam.canvas);

    ctx.drawImage(webcam.canvas, 0, 0);

    if (pose) {
        tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
        tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
    }
}

init();
</script>

</body>
</html>
