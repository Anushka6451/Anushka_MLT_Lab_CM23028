<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teachable Machine Pose Dashboard</title>

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>

    <!-- Teachable Machine Pose -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            text-align: center;
            padding: 15px;
            font-size: 22px;
            background: #1e293b;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .left {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
        }

        .right {
            flex: 1;
            padding: 20px;
            background: #1e293b;
        }

        canvas {
            border-radius: 10px;
        }

        .card {
            background: #334155;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

<header>🧍 Teachable Machine Pose Dashboard</header>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <canvas id="canvas"></canvas>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="card">
            <h3>▶ Control</h3>
            <button onclick="init()">Start Detection</button>
        </div>

        <div class="card">
            <h3>📊 Predictions</h3>
            <div id="label-container"></div>
        </div>

        <div class="card">
            <h3>📌 Status</h3>
            <div id="status">Not Started</div>
        </div>

    </div>
</div>

<script>
    // 🔴 IMPORTANT: keep your model path
    const URL = "./my_model/";

    let model, webcam, ctx, labelContainer, maxPredictions;

    async function init() {
        document.getElementById("status").innerText = "Loading model...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        document.getElementById("status").innerText = "Model Loaded ✅";

        const size = 500;
const flip = true;

webcam = new tmPose.Webcam(size, size, flip);

await webcam.setup();

await webcam.play();

window.requestAnimationFrame(loop);

        const canvas = document.getElementById("canvas");
        canvas.width = size;
        canvas.height = size;

        ctx = canvas.getContext("2d");

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            let div = document.createElement("div");
            div.style.marginBottom = "8px";
            labelContainer.appendChild(div);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = prediction[i].probability.toFixed(2);

            labelContainer.childNodes[i].innerHTML =
                `${prediction[i].className}: ${prob}`;
        }

        drawPose(pose);
    }

    function drawPose(pose) {
        if (webcam.canvas) {
            ctx.drawImage(webcam.canvas, 0, 0);

            if (pose) {
                const minConfidence = 0.5;

                tmPose.drawKeypoints(pose.keypoints, minConfidence, ctx);
                tmPose.drawSkeleton(pose.keypoints, minConfidence, ctx);
            }
        }
    }
</script>

</body>
</html>
