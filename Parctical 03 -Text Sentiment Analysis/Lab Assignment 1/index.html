<!DOCTYPE html>
<html>
<head>
  <title>MNIST CNN Training</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
</head>
<body>
  <h2>📊 Train CNN on MNIST</h2>
  <div id="status">Training...</div>

  <script>
    async function run() {
      const mnist = await tf.data.mnist(); // requires tfjs-datasets
      const trainData = mnist.train;
      const testData = mnist.test;

      const trainImages = trainData.images.reshape([60000,28,28,1]).div(255);
      const trainLabels = tf.oneHot(trainData.labels,10);
      const testImages = testData.images.reshape([10000,28,28,1]).div(255);
      const testLabels = tf.oneHot(testData.labels,10);

      const model = tf.sequential();
      model.add(tf.layers.conv2d({filters:32,kernelSize:3,activation:'relu',inputShape:[28,28,1]}));
      model.add(tf.layers.maxPooling2d({poolSize:2,strides:2}));
      model.add(tf.layers.flatten());
      model.add(tf.layers.dense({units:128,activation:'relu'}));
      model.add(tf.layers.dense({units:10,activation:'softmax'}));

      model.compile({optimizer:'adam',loss:'categoricalCrossentropy',metrics:['accuracy']});

      await model.fit(trainImages, trainLabels, {epochs:5, batchSize:128});
      const eval = model.evaluate(testImages, testLabels);
      document.getElementById("status").innerText =
        "Test Accuracy after 5 epochs: " + (eval[1].dataSync()[0]*100).toFixed(2) + "%";
    }
    run();
  </script>
</body>
</html>
