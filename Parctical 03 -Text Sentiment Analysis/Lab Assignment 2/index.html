<!DOCTYPE html>
<html>
<head>
  <title>Digit Classification Canvas</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>
<body>
  <h2>🖊️ Draw a Digit and Classify</h2>
  <canvas id="canvas" width="280" height="280" style="border:2px solid #333;background:#fff;"></canvas><br>
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="predict()">Predict</button>
  <div id="result">Awaiting input...</div>

  <script>
    let model;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.lineWidth = 20;
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'black';
    let drawing = false;

    canvas.addEventListener('mousedown', () => { drawing = true; ctx.beginPath(); });
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
      if (!drawing) return;
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    }

    function clearCanvas() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      document.getElementById("result").innerText = "Canvas cleared.";
    }

    function preprocessCanvas() {
      let imgData = ctx.getImageData(0,0,280,280);
      return tf.browser.fromPixels(imgData,1)
        .resizeNearestNeighbor([28,28])
        .toFloat()
        .div(255.0)
        .expandDims(0);
    }

    async function loadModel() {
      // Load your trained CNN model hosted locally or online
      model = await tf.loadLayersModel('mnist_cnn_model/model.json');
      document.getElementById("result").innerText = "Model loaded ✅ Draw a digit!";
    }

    async function predict() {
      if (!model) {
        document.getElementById("result").innerText = "Model not loaded yet...";
        return;
      }
      const tensor = preprocessCanvas();
      const prediction = model.predict(tensor);
      const digit = prediction.argMax(1).dataSync()[0];
      document.getElementById("result").innerText = "Predicted Digit: " + digit;
    }

    loadModel();
  </script>
</body>
</html>
