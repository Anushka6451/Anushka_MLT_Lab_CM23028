<!DOCTYPE html>
<html>
<head>

<title>Model Comparison Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/resnet"></script>

<style>

body{
font-family:Arial;
background:#141e30;
background:linear-gradient(to right,#243b55,#141e30);
color:white;
text-align:center;
}

.card{
background:white;
color:black;
padding:20px;
margin:20px auto;
width:60%;
border-radius:15px;
}

img{
width:250px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#243b55;
color:white;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<h1>MobileNet vs ResNet Comparison</h1>

<div class="card">

<img id="img" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Pug_600.jpg">

<br><br>

<button onclick="compare()">Run Comparison</button>

<h3>Results</h3>

<div id="output"></div>

</div>

<script>

let mobileModel;
let resnetModel;

async function loadModels(){

mobileModel=await mobilenet.load();
resnetModel=await resnet.load();

}

loadModels();

async function compare(){

const image=document.getElementById("img");

const mobilePred=await mobileModel.classify(image);
const resnetPred=await resnetModel.classify(image);

document.getElementById("output").innerHTML=
"<b>MobileNet:</b> "+mobilePred[0].className+"<br>"+
"<b>ResNet:</b> "+resnetPred[0].className;

}

</script>

</body>
</html>
