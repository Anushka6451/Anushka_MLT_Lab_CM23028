<!DOCTYPE html>
<html>
<head>
  <title>Train & Save Model</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.12);
      padding: 40px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      backdrop-filter: blur(15px);
    }

    h2 { font-size: 26px; }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>📊 Train & Save Model</h2>
  <p>Model learns: <b>y = 2x</b></p>

  <button onclick="trainAndSave()">Train & Save</button>

  <div id="status">Status: Waiting...</div>
</div>

<script>
async function trainAndSave() {
  const model = tf.sequential();
  model.add(tf.layers.dense({ units: 1, inputShape: [1] }));

  model.compile({ loss: 'meanSquaredError', optimizer: 'sgd' });

  const xs = tf.tensor([1,2,3,4,5]);
  const ys = tf.tensor([2,4,6,8,10]);

  status.innerText = "Training...";
  await model.fit(xs, ys, { epochs: 200 });

  await model.save('localstorage://my-model');

  status.innerText = "Model Saved ✅ (y = 2x)";
}
</script>

</body>
</html>
